<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#050307">
  <title>برای صبا ❤️</title>

  <style>
    :root{
      --bg:#050307;
      --text:#fffafc;
      --muted:#d8cbd1;
      --rose:#ff5e91;
      --rose-dark:#a41149;
      --glass:rgba(25,12,29,.72);
      --line:rgba(255,255,255,.12);
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}

    body{
      margin:0;
      min-height:100vh;
      overflow-x:hidden;
      font-family:Tahoma,Arial,sans-serif;
      color:var(--text);
      background:var(--bg);
    }

    button{font-family:inherit}

    .intro{
      position:fixed;
      inset:0;
      z-index:1000;
      display:grid;
      place-items:center;
      padding:24px;
      background:
        radial-gradient(circle at center,rgba(99,20,64,.15),transparent 35%),
        #030205;
      transition:opacity 1s ease,visibility 1s ease;
    }

    .intro.hide{
      opacity:0;
      visibility:hidden;
      pointer-events:none;
    }

    .intro-inner{
      width:min(94%,680px);
      text-align:center;
    }

    .intro-line{
      min-height:92px;
      margin:0;
      opacity:0;
      transform:translateY(12px);
      font-size:clamp(25px,6.7vw,43px);
      line-height:1.9;
      color:#fff;
      transition:opacity .85s ease,transform .85s ease;
    }

    .intro-line.show{
      opacity:1;
      transform:translateY(0);
    }

    .small-heart{
      display:none;
      margin:24px auto 0;
      font-size:42px;
      animation:heartbeat 1.35s infinite;
      filter:drop-shadow(0 0 20px rgba(255,84,141,.6));
    }

    @keyframes heartbeat{
      0%,100%{transform:scale(1)}
      17%{transform:scale(1.18)}
      32%{transform:scale(1)}
      48%{transform:scale(1.11)}
    }

    .ready-btn,
    .final-button{
      border:0;
      border-radius:999px;
      color:white;
      font-weight:bold;
      cursor:pointer;
      background:linear-gradient(135deg,var(--rose),var(--rose-dark));
      box-shadow:0 16px 42px rgba(214,41,103,.28);
    }

    .ready-btn{
      display:none;
      width:min(100%,340px);
      min-height:54px;
      margin:26px auto 0;
      font-size:17px;
      animation:fadeUp .8s ease both;
    }

    @keyframes fadeUp{
      from{opacity:0;transform:translateY(12px)}
      to{opacity:1;transform:translateY(0)}
    }

    .page{
      min-height:100vh;
      padding:24px 12px 80px;
      background:
        linear-gradient(rgba(7,3,9,.28),rgba(7,3,9,.84)),
        url("saba.jpg") center top/cover fixed;
    }

    .card{
      width:min(94%,760px);
      margin:0 auto;
      padding:16px;
      border:1px solid var(--line);
      border-radius:30px;
      background:var(--glass);
      backdrop-filter:blur(16px);
      box-shadow:0 30px 100px rgba(0,0,0,.6);
    }

    .image-wrap{
      overflow:hidden;
      border-radius:22px;
      box-shadow:0 18px 50px rgba(0,0,0,.45);
    }

    .image{
      display:block;
      width:100%;
      max-height:760px;
      object-fit:contain;
      background:rgba(0,0,0,.14);
      animation:slowZoom 15s ease-in-out infinite alternate;
    }

    @keyframes slowZoom{
      from{transform:scale(1)}
      to{transform:scale(1.035)}
    }

    .content{
      padding:30px 18px 18px;
      text-align:center;
    }

    .title{
      margin:0;
      font-size:clamp(32px,7vw,50px);
      color:#ffdbe5;
    }

    .subtitle{
      margin:10px 0 26px;
      color:var(--muted);
      line-height:1.9;
      font-size:15px;
    }

    .divider{
      width:82px;
      height:1px;
      margin:0 auto 28px;
      background:linear-gradient(90deg,transparent,#ff8fb1,transparent);
    }

    .typed-area{
      min-height:340px;
      display:flex;
      justify-content:center;
      align-items:flex-start;
    }

    .typed-text{
      max-width:660px;
      white-space:pre-line;
      line-height:2.25;
      font-size:clamp(17px,4vw,20px);
      color:#fff9fb;
    }

    .cursor{
      display:inline-block;
      margin-right:3px;
      color:#ff8fb1;
      animation:blink .8s infinite;
    }

    @keyframes blink{50%{opacity:0}}

    .aside{
      min-height:92px;
      margin-top:22px;
      opacity:0;
      transform:translateY(12px);
      transition:opacity 1s ease,transform 1s ease;
      color:#ffdce6;
      font-size:clamp(18px,4.5vw,24px);
      line-height:2;
    }

    .aside.show{
      opacity:1;
      transform:translateY(0);
    }

    .final-button{
      display:none;
      width:min(100%,390px);
      min-height:54px;
      margin:18px auto 0;
      font-size:16px;
      animation:fadeUp .9s ease both;
    }

    .player{
      margin-top:24px;
      padding:17px;
      border-radius:22px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.055);
    }

    .play-btn{
      width:100%;
      min-height:50px;
      border:0;
      border-radius:999px;
      color:white;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
      background:linear-gradient(135deg,var(--rose),var(--rose-dark));
    }

    .progress{
      height:7px;
      margin-top:16px;
      overflow:hidden;
      border-radius:999px;
      cursor:pointer;
      background:rgba(255,255,255,.13);
    }

    .progress-fill{
      width:0;
      height:100%;
      background:linear-gradient(90deg,#ffd0df,#ff4f86);
    }

    .time{
      margin-top:8px;
      direction:ltr;
      text-align:left;
      color:#c8b8bf;
      font-size:12px;
    }

    .finale{
      position:fixed;
      inset:0;
      z-index:900;
      display:grid;
      place-items:center;
      padding:24px;
      opacity:0;
      visibility:hidden;
      background:
        radial-gradient(circle at center,rgba(105,20,67,.14),transparent 34%),
        rgba(2,1,3,.96);
      transition:opacity 1.2s ease,visibility 1.2s ease;
    }

    .finale.show{
      opacity:1;
      visibility:visible;
    }

    .finale-inner{
      width:min(94%,650px);
      text-align:center;
    }

    .finale-line{
      min-height:86px;
      margin:0;
      opacity:0;
      transform:translateY(12px);
      font-size:clamp(24px,6vw,40px);
      line-height:1.9;
      transition:opacity .9s ease,transform .9s ease;
    }

    .finale-line.show{
      opacity:1;
      transform:translateY(0);
    }

    .signature{
      display:none;
      margin-top:26px;
      color:#ffd7e3;
      font-size:clamp(22px,5vw,32px);
      line-height:2;
      animation:fadeUp 1s ease both;
    }

    .signature strong{
      display:block;
      margin-top:8px;
      color:#fff;
      font-size:1.25em;
    }

    .close-finale{
      display:none;
      width:min(100%,300px);
      min-height:50px;
      margin:24px auto 0;
      border:1px solid rgba(255,255,255,.14);
      border-radius:999px;
      color:#fff;
      background:rgba(255,255,255,.06);
      cursor:pointer;
      animation:fadeUp 1s ease both;
    }

    .particle{
      position:fixed;
      z-index:5;
      top:-40px;
      pointer-events:none;
      animation:fall linear forwards;
      filter:drop-shadow(0 4px 6px rgba(0,0,0,.25));
    }

    @keyframes fall{
      0%{transform:translate3d(0,-10vh,0) rotate(0deg);opacity:0}
      10%{opacity:.85}
      100%{transform:translate3d(var(--drift),112vh,0) rotate(500deg);opacity:0}
    }

    @media(max-width:560px){
      .card{padding:10px;border-radius:23px}
      .content{padding:27px 12px 14px}
      .typed-area{min-height:395px}
    }
  </style>
</head>

<body>
  <section id="intro" class="intro">
    <div class="intro-inner">
      <p id="introLine" class="intro-line"></p>
      <div id="smallHeart" class="small-heart">❤️</div>
      <button id="readyButton" class="ready-btn" type="button">آماده‌ام</button>
    </div>
  </section>

  <main class="page">
    <article class="card">
      <div class="image-wrap">
        <img class="image" src="saba.jpg" alt="برای صبا">
      </div>

      <section class="content">
        <h1 class="title">صبا جان ❤️</h1>

        <p class="subtitle">
          شاید این صفحه خیلی ساده باشد؛
          اما حرف‌هایش واقعی‌اند.
        </p>

        <div class="divider"></div>

        <div class="typed-area">
          <div>
            <span id="typedText" class="typed-text"></span>
            <span class="cursor">|</span>
          </div>
        </div>

        <div id="aside" class="aside">
          راستی...<br>
          ممنونم که هستی. 🌹
        </div>

        <button id="finalButton" class="final-button" type="button">
          یه پیام آخر برات دارم...
        </button>

        <section class="player">
          <button id="playButton" class="play-btn" type="button">
            پخش آهنگ
          </button>

          <div id="progress" class="progress">
            <div id="progressFill" class="progress-fill"></div>
          </div>

          <div id="time" class="time">00:00 / 00:00</div>

          <audio id="music" preload="metadata" loop>
            <source src="music.mp3" type="audio/mpeg">
          </audio>
        </section>
      </section>
    </article>
  </main>

  <section id="finale" class="finale">
    <div class="finale-inner">
      <p id="finaleLine" class="finale-line"></p>

      <div id="signature" class="signature">
        با عشق...
        <strong>کوروش ❤️</strong>
      </div>

      <button id="closeFinale" class="close-finale" type="button">
        برگشتن به صفحه
      </button>
    </div>
  </section>

  <script>
    const introMessages = [
      "سلام صبا 😊",
      "یه چیزی هست که دلم می‌خواست فقط خودت ببینیش...",
      "شاید هیچ‌وقت نتونم همه‌ی حسم رو با حرف زدن بگم...",
      "ولی گفتم شاید اینجوری بهتر بتونم نشونش بدم."
    ];

    const mainMessage =
`تو شبیه آرامشی هستی که بعد از هر طوفان،
دل به دنبالش می‌گردد.

حضورت، ساده‌ترین لحظه‌های زندگی را
به زیباترین خاطره‌ها تبدیل می‌کند.

لبخندت دلیل روشن روزهایم و نامت
زیباترین واژه‌ای‌ست که قلبم می‌شناسد.

دوستت دارم؛ عمیق‌تر از تمام واژه‌ها
و ماندگارتر از تمام زمان‌ها. ❤️`;

    const finaleMessages = [
      "فقط یه چیز مونده...",
      "ممنونم که هستی...",
      "دوستت دارم ❤️"
    ];

    const intro = document.getElementById("intro");
    const introLine = document.getElementById("introLine");
    const smallHeart = document.getElementById("smallHeart");
    const readyButton = document.getElementById("readyButton");

    const typedText = document.getElementById("typedText");
    const aside = document.getElementById("aside");
    const finalButton = document.getElementById("finalButton");
    const music = document.getElementById("music");
    const playButton = document.getElementById("playButton");
    const progress = document.getElementById("progress");
    const progressFill = document.getElementById("progressFill");
    const timeLabel = document.getElementById("time");

    const finale = document.getElementById("finale");
    const finaleLine = document.getElementById("finaleLine");
    const signature = document.getElementById("signature");
    const closeFinale = document.getElementById("closeFinale");

    let typingStarted = false;
    let introIndex = 0;
    let finaleRunning = false;

    function showIntroMessage(){
      introLine.classList.remove("show");

      setTimeout(()=>{
        introLine.textContent = introMessages[introIndex];
        introLine.classList.add("show");

        setTimeout(()=>{
          introIndex++;

          if(introIndex < introMessages.length){
            showIntroMessage();
          }else{
            setTimeout(()=>{
              smallHeart.style.display = "block";
              readyButton.style.display = "block";
            },900);
          }
        },2100);
      },450);
    }

    showIntroMessage();

    function typeMainMessage(){
      if(typingStarted) return;
      typingStarted = true;
      let index = 0;

      function next(){
        if(index < mainMessage.length){
          typedText.textContent += mainMessage[index];
          const current = mainMessage[index];
          index++;
          setTimeout(next,current === "\n" ? 170 : 45);
        }else{
          setTimeout(()=>{
            aside.classList.add("show");

            setTimeout(()=>{
              finalButton.style.display = "block";
              finalButton.scrollIntoView({behavior:"smooth",block:"center"});
            },1300);
          },1000);
        }
      }

      next();
    }

    readyButton.addEventListener("click",async()=>{
      intro.classList.add("hide");
      typeMainMessage();

      try{
        await music.play();
        playButton.textContent = "توقف آهنگ";
      }catch(error){
        playButton.textContent = "پخش آهنگ";
      }
    });

    playButton.addEventListener("click",async()=>{
      if(music.paused){
        try{
          await music.play();
          playButton.textContent = "توقف آهنگ";
        }catch(error){
          alert("آهنگ پخش نشد. فایل music.mp3 را بررسی کن.");
        }
      }else{
        music.pause();
        playButton.textContent = "ادامه آهنگ";
      }
    });

    music.addEventListener("play",()=>{
      playButton.textContent = "توقف آهنگ";
    });

    music.addEventListener("pause",()=>{
      playButton.textContent = "ادامه آهنگ";
    });

    function formatTime(seconds){
      if(!Number.isFinite(seconds)) return "00:00";
      const m = Math.floor(seconds/60);
      const s = Math.floor(seconds%60);
      return `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
    }

    music.addEventListener("timeupdate",()=>{
      const percent = music.duration ? (music.currentTime/music.duration)*100 : 0;
      progressFill.style.width = percent + "%";
      timeLabel.textContent =
        `${formatTime(music.currentTime)} / ${formatTime(music.duration)}`;
    });

    progress.addEventListener("click",event=>{
      if(!music.duration) return;
      const rect = progress.getBoundingClientRect();
      const ratio = (event.clientX - rect.left)/rect.width;
      music.currentTime = Math.max(0,Math.min(1,ratio))*music.duration;
    });

    function showFinale(){
      if(finaleRunning) return;
      finaleRunning = true;
      finale.classList.add("show");

      let i = 0;

      function nextLine(){
        finaleLine.classList.remove("show");

        setTimeout(()=>{
          finaleLine.textContent = finaleMessages[i];
          finaleLine.classList.add("show");

          setTimeout(()=>{
            i++;

            if(i < finaleMessages.length){
              nextLine();
            }else{
              setTimeout(()=>{
                signature.style.display = "block";
                closeFinale.style.display = "block";
              },1000);
            }
          },2200);
        },450);
      }

      nextLine();
    }

    finalButton.addEventListener("click",showFinale);

    closeFinale.addEventListener("click",()=>{
      finale.classList.remove("show");
      finaleRunning = false;
      signature.style.display = "none";
      closeFinale.style.display = "none";
      finaleLine.textContent = "";
      finaleLine.classList.remove("show");
    });

    function createParticle(){
      const particle = document.createElement("div");
      const symbols = ["❤️","🌸","✨"];

      particle.className = "particle";
      particle.textContent = symbols[Math.floor(Math.random()*symbols.length)];
      particle.style.left = Math.random()*100 + "vw";
      particle.style.fontSize = 14 + Math.random()*16 + "px";
      particle.style.animationDuration = 8 + Math.random()*7 + "s";
      particle.style.setProperty("--drift",(-90 + Math.random()*180) + "px");

      document.body.appendChild(particle);
      setTimeout(()=>particle.remove(),15500);
    }

    setInterval(createParticle,1000);
  </script>
</body>
</html>
