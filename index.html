<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#070509">
  <title>برای صبا ❤️</title>

  <style>
    :root{
      --bg:#070509;
      --card:rgba(20,14,23,.74);
      --text:#fffafc;
      --muted:#d8cbd1;
      --rose:#ff648f;
      --rose-dark:#a8134a;
      --line:rgba(255,255,255,.11);
      --bubble:rgba(255,255,255,.075);
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}

    body{
      margin:0;
      min-height:100vh;
      overflow-x:hidden;
      font-family:Tahoma,Arial,sans-serif;
      color:var(--text);
      background:var(--bg);
    }

    button{font-family:inherit}

    /* ---------- INTRO ---------- */
    .intro{
      position:fixed;
      inset:0;
      z-index:1000;
      display:grid;
      place-items:center;
      padding:24px;
      background:
        radial-gradient(circle at 50% 45%,rgba(115,28,71,.14),transparent 34%),
        #040306;
      transition:opacity 1s ease,visibility 1s ease;
    }

    .intro.hide{
      opacity:0;
      visibility:hidden;
      pointer-events:none;
    }

    .intro-inner{
      width:min(94%,680px);
      text-align:center;
    }

    .intro-text{
      min-height:110px;
      margin:0;
      opacity:0;
      transform:translateY(12px);
      font-size:clamp(26px,6.8vw,44px);
      line-height:1.9;
      transition:opacity .8s ease,transform .8s ease;
    }

    .intro-text.show{
      opacity:1;
      transform:translateY(0);
    }

    .promise-btn{
      display:none;
      width:min(100%,340px);
      min-height:56px;
      margin:28px auto 0;
      border:0;
      border-radius:999px;
      color:#fff;
      font-size:17px;
      font-weight:bold;
      cursor:pointer;
      background:linear-gradient(135deg,var(--rose),var(--rose-dark));
      box-shadow:0 16px 42px rgba(215,42,104,.27);
      animation:fadeUp .8s ease both;
    }

    .intro-note{
      display:none;
      margin-top:12px;
      color:#bfaeb6;
      font-size:12px;
      animation:fadeUp .8s ease .1s both;
    }

    @keyframes fadeUp{
      from{opacity:0;transform:translateY(12px)}
      to{opacity:1;transform:translateY(0)}
    }

    /* ---------- MAIN ---------- */
    .page{
      min-height:100vh;
      padding:20px 10px 88px;
      background:
        linear-gradient(rgba(7,4,9,.30),rgba(7,4,9,.88)),
        url("saba.jpg?v=final") center top/cover fixed;
    }

    .card{
      width:min(95%,760px);
      margin:0 auto;
      padding:12px;
      border:1px solid var(--line);
      border-radius:28px;
      background:var(--card);
      backdrop-filter:blur(16px);
      box-shadow:0 30px 100px rgba(0,0,0,.58);
    }

    .image-wrap{
      overflow:hidden;
      border-radius:20px;
      box-shadow:0 18px 48px rgba(0,0,0,.42);
    }

    .image{
      display:block;
      width:100%;
      max-height:760px;
      object-fit:contain;
      background:rgba(0,0,0,.13);
      animation:slowZoom 16s ease-in-out infinite alternate;
    }

    @keyframes slowZoom{
      from{transform:scale(1)}
      to{transform:scale(1.032)}
    }

    .content{
      padding:28px 14px 16px;
    }

    .title{
      margin:0;
      text-align:center;
      font-size:clamp(32px,7vw,48px);
      color:#ffdce6;
    }

    .subtitle{
      margin:9px auto 25px;
      text-align:center;
      color:var(--muted);
      line-height:1.9;
      font-size:14px;
    }

    .divider{
      width:76px;
      height:1px;
      margin:0 auto 26px;
      background:linear-gradient(90deg,transparent,#ff91b0,transparent);
    }

    /* message bubbles */
    .messages{
      display:flex;
      flex-direction:column;
      gap:13px;
      min-height:330px;
    }

    .bubble{
      max-width:88%;
      padding:14px 16px;
      border:1px solid rgba(255,255,255,.09);
      border-radius:18px 18px 5px 18px;
      background:var(--bubble);
      color:#fff9fb;
      font-size:clamp(16px,4vw,19px);
      line-height:2;
      text-align:right;
      opacity:0;
      transform:translateY(12px);
      transition:opacity .65s ease,transform .65s ease;
      box-shadow:0 8px 24px rgba(0,0,0,.14);
    }

    .bubble.show{
      opacity:1;
      transform:translateY(0);
    }

    .bubble.soft{
      color:#ffdce6;
      background:rgba(255,100,143,.08);
    }

    .last-message-wrap{
      min-height:80px;
      margin-top:22px;
      text-align:center;
    }

    .last-message-btn{
      display:none;
      width:min(100%,390px);
      min-height:54px;
      border:0;
      border-radius:999px;
      color:white;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
      background:linear-gradient(135deg,var(--rose),var(--rose-dark));
      box-shadow:0 15px 38px rgba(215,42,104,.25);
      animation:fadeUp .8s ease both;
    }

    /* minimal music control */
    .music-fab{
      position:fixed;
      left:16px;
      bottom:16px;
      z-index:30;
      width:48px;
      height:48px;
      display:grid;
      place-items:center;
      border:1px solid rgba(255,255,255,.14);
      border-radius:50%;
      color:#fff;
      font-size:20px;
      cursor:pointer;
      background:rgba(20,10,23,.78);
      backdrop-filter:blur(12px);
      box-shadow:0 10px 30px rgba(0,0,0,.35);
    }

    .music-fab.playing{
      animation:pulseMusic 1.6s ease-in-out infinite;
    }

    @keyframes pulseMusic{
      0%,100%{transform:scale(1)}
      50%{transform:scale(1.07)}
    }

    /* ---------- FINALE ---------- */
    .finale{
      position:fixed;
      inset:0;
      z-index:900;
      display:grid;
      place-items:center;
      padding:24px;
      opacity:0;
      visibility:hidden;
      background:
        radial-gradient(circle at center,rgba(105,20,67,.12),transparent 34%),
        rgba(3,2,4,.97);
      transition:opacity 1s ease,visibility 1s ease;
    }

    .finale.show{
      opacity:1;
      visibility:visible;
    }

    .finale-inner{
      width:min(94%,650px);
      text-align:center;
    }

    .finale-text{
      min-height:100px;
      margin:0;
      opacity:0;
      transform:translateY(12px);
      font-size:clamp(25px,6vw,42px);
      line-height:1.9;
      transition:opacity .8s ease,transform .8s ease;
    }

    .finale-text.show{
      opacity:1;
      transform:translateY(0);
    }

    .signature{
      display:none;
      margin-top:28px;
      color:#fff;
      font-size:clamp(26px,6vw,40px);
      line-height:1.9;
      animation:fadeUp 1s ease both;
    }

    .signature small{
      display:block;
      margin-bottom:2px;
      color:#d9cbd1;
      font-size:.55em;
      font-weight:normal;
    }

    .close-btn{
      display:none;
      width:min(100%,280px);
      min-height:48px;
      margin:26px auto 0;
      border:1px solid rgba(255,255,255,.13);
      border-radius:999px;
      color:#fff;
      background:rgba(255,255,255,.055);
      cursor:pointer;
      animation:fadeUp 1s ease .1s both;
    }

    .particle{
      position:fixed;
      z-index:5;
      top:-40px;
      pointer-events:none;
      animation:fall linear forwards;
      filter:drop-shadow(0 4px 6px rgba(0,0,0,.23));
    }

    @keyframes fall{
      0%{transform:translate3d(0,-10vh,0) rotate(0deg);opacity:0}
      10%{opacity:.82}
      100%{transform:translate3d(var(--drift),112vh,0) rotate(480deg);opacity:0}
    }

    @media(max-width:560px){
      .card{border-radius:22px}
      .content{padding:26px 10px 14px}
      .messages{min-height:400px}
      .bubble{max-width:94%}
    }

    @media(prefers-reduced-motion:reduce){
      *,*::before,*::after{
        animation-duration:.01ms!important;
        animation-iteration-count:1!important;
      }
    }
  </style>
</head>

<body>
  <section id="intro" class="intro">
    <div class="intro-inner">
      <p id="introText" class="intro-text"></p>

      <button id="promiseButton" class="promise-btn" type="button">
        قول می‌دم ❤️
      </button>

      <div id="introNote" class="intro-note">
        بهتره صدا روشن باشه
      </div>
    </div>
  </section>

  <main class="page">
    <article class="card">
      <div class="image-wrap">
        <img class="image" src="saba.jpg?v=final" alt="برای صبا">
      </div>

      <section class="content">
        <h1 class="title">صبا جان ❤️</h1>

        <p class="subtitle">
          شاید این صفحه ساده باشه؛ ولی حرف‌هاش واقعی‌ان.
        </p>

        <div class="divider"></div>

        <div id="messages" class="messages"></div>

        <div class="last-message-wrap">
          <button id="lastMessageButton" class="last-message-btn" type="button">
            یه چیز کوچیک دیگه مونده...
          </button>
        </div>
      </section>
    </article>
  </main>

  <button id="musicButton" class="music-fab" type="button" aria-label="کنترل آهنگ">
    🎵
  </button>

  <audio id="music" preload="metadata" loop>
    <source src="music.mp3?v=final" type="audio/mpeg">
  </audio>

  <section id="finale" class="finale">
    <div class="finale-inner">
      <p id="finaleText" class="finale-text"></p>

      <div id="signature" class="signature">
        <small>با عشق...</small>
        کوروش
      </div>

      <button id="closeButton" class="close-btn" type="button">
        برگشتن
      </button>
    </div>
  </section>

  <script>
    const introMessages = [
      "سلام صبا 😊",
      "امروز فقط یه خواهش ازت دارم...",
      "تا آخر این صفحه باهام بمون...",
      "قول؟"
    ];

    const messageBubbles = [
      "تو شبیه آرامشی هستی که بعد از هر طوفان، دل به دنبالش می‌گرده.",
      "حضورت، ساده‌ترین لحظه‌های زندگی رو به زیباترین خاطره‌ها تبدیل می‌کنه.",
      "لبخندت دلیل روشن روزهامه و اسمت زیباترین واژه‌ایه که قلبم می‌شناسه.",
      "دوستت دارم؛ عمیق‌تر از تمام واژه‌ها و موندگارتر از تمام زمان‌ها. ❤️",
      "راستی...",
      "ممنونم که هستی. 🌹"
    ];

    const finaleMessages = [
      "اگر تا اینجا موندی...",
      "یعنی ارزشش رو داشت.",
      "دوستت دارم ❤️"
    ];

    const intro = document.getElementById("intro");
    const introText = document.getElementById("introText");
    const promiseButton = document.getElementById("promiseButton");
    const introNote = document.getElementById("introNote");

    const messages = document.getElementById("messages");
    const lastMessageButton = document.getElementById("lastMessageButton");
    const music = document.getElementById("music");
    const musicButton = document.getElementById("musicButton");

    const finale = document.getElementById("finale");
    const finaleText = document.getElementById("finaleText");
    const signature = document.getElementById("signature");
    const closeButton = document.getElementById("closeButton");

    let introIndex = 0;
    let messagesStarted = false;
    let finaleRunning = false;

    function showIntroMessage(){
      introText.classList.remove("show");

      setTimeout(()=>{
        introText.textContent = introMessages[introIndex];
        introText.classList.add("show");

        setTimeout(()=>{
          introIndex++;

          if(introIndex < introMessages.length){
            showIntroMessage();
          }else{
            setTimeout(()=>{
              promiseButton.style.display = "block";
              introNote.style.display = "block";
            },700);
          }
        },1700);
      },350);
    }

    showIntroMessage();

    async function startExperience(){
      intro.classList.add("hide");

      try{
        await music.play();
        musicButton.classList.add("playing");
        musicButton.textContent = "⏸";
      }catch(error){
        musicButton.textContent = "🎵";
      }

      showMessageBubbles();
    }

    promiseButton.addEventListener("click",startExperience);

    function showMessageBubbles(){
      if(messagesStarted) return;
      messagesStarted = true;

      messageBubbles.forEach((text,index)=>{
        const bubble = document.createElement("div");
        bubble.className = "bubble" + (index >= 4 ? " soft" : "");
        bubble.textContent = text;
        messages.appendChild(bubble);

        setTimeout(()=>{
          bubble.classList.add("show");
          bubble.scrollIntoView({behavior:"smooth",block:"center"});
        },900 + index * 1900);
      });

      const totalDelay = 900 + messageBubbles.length * 1900;

      setTimeout(()=>{
        lastMessageButton.style.display = "inline-block";
        lastMessageButton.scrollIntoView({behavior:"smooth",block:"center"});
      },totalDelay + 500);
    }

    musicButton.addEventListener("click",async()=>{
      if(music.paused){
        try{
          await music.play();
          musicButton.textContent = "⏸";
          musicButton.classList.add("playing");
        }catch(error){
          alert("آهنگ پخش نشد. فایل music.mp3 را بررسی کن.");
        }
      }else{
        music.pause();
        musicButton.textContent = "🎵";
        musicButton.classList.remove("playing");
      }
    });

    function showFinale(){
      if(finaleRunning) return;
      finaleRunning = true;
      finale.classList.add("show");

      let index = 0;

      function nextFinale(){
        finaleText.classList.remove("show");

        setTimeout(()=>{
          finaleText.textContent = finaleMessages[index];
          finaleText.classList.add("show");

          setTimeout(()=>{
            index++;

            if(index < finaleMessages.length){
              nextFinale();
            }else{
              setTimeout(()=>{
                signature.style.display = "block";
                closeButton.style.display = "inline-block";
              },900);
            }
          },1900);
        },350);
      }

      nextFinale();
    }

    lastMessageButton.addEventListener("click",showFinale);

    closeButton.addEventListener("click",()=>{
      finale.classList.remove("show");
      finaleRunning = false;
      finaleText.textContent = "";
      finaleText.classList.remove("show");
      signature.style.display = "none";
      closeButton.style.display = "none";
    });

    function createParticle(){
      const particle = document.createElement("div");
      const symbols = ["❤️","🌸","✨"];

      particle.className = "particle";
      particle.textContent = symbols[Math.floor(Math.random()*symbols.length)];
      particle.style.left = Math.random()*100 + "vw";
      particle.style.fontSize = 13 + Math.random()*15 + "px";
      particle.style.animationDuration = 9 + Math.random()*7 + "s";
      particle.style.setProperty("--drift",(-80 + Math.random()*160) + "px");

      document.body.appendChild(particle);
      setTimeout(()=>particle.remove(),16500);
    }

    setInterval(createParticle,1200);
  </script>
</body>
</html>
